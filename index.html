<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 星際狙擊 - 勇者召喚陣</title>
    <style>
        :root {
            --primary: #c084fc; /* 霓虹紫 */
            --accent: #2dd4bf;  /* 霓虹青 */
            --danger: #f43f5e;  /* 警告紅 */
            --panel-bg: rgba(15, 23, 42, 0.85);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; }

        /* ✅ 修正：html 設 height:100%，body 改用 100vh 取代 100dvh */
        html {
            height: 100%;
        }
        body {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background-color: #020617;
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            user-select: none;
            -webkit-user-select: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        /* 左側控制面板 */
        aside {
            width: 320px;
            background-color: var(--panel-bg);
            border-right: 1px solid rgba(192, 132, 252, 0.2);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 5px 0 30px rgba(0,0,0,0.8);
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        aside h2 {
            color: var(--accent);
            text-align: center;
            margin-top: 0;
            font-size: 22px;
            text-shadow: 0 0 10px rgba(45, 212, 191, 0.8);
            letter-spacing: 2px;
        }
        textarea {
            flex: 1;
            width: 100%;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(192, 132, 252, 0.3);
            color: var(--text-main);
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            resize: none;
            outline: none;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(45, 212, 191, 0.3); }
        
        .checkbox-row {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 15px;
            cursor: pointer;
        }
        .checkbox-row input { margin-right: 8px; accent-color: var(--accent); width: 16px; height: 16px;}

        .btn-reset {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-reset:hover { background: rgba(192, 132, 252, 0.2); box-shadow: 0 0 15px rgba(192, 132, 252, 0.5); }
        .btn-reset:active { transform: translateY(2px); }

        .drawn-section { flex: 0.8; display: flex; flex-direction: column; }
        .drawn-section h3 { font-size: 14px; color: var(--primary); margin: 0 0 8px 0; }
        .drawn-list {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 10px 10px 10px 25px;
            margin: 0;
            overflow-y: auto;
            font-size: 14px;
            color: #cbd5e1;
        }
        .drawn-list li { margin-bottom: 4px; }

        /* 右側主畫面 (包含 Three.js) */
        main {
            flex: 1;
            position: relative;
            overflow: hidden;
            /* 隱藏預設游標，使用自訂準星 */
            cursor: none; 
            touch-action: none;
        }

        #webgl-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* 自訂狙擊準星 */
        #crosshair {
            position: absolute;
            width: 40px; height: 40px;
            border: 2px solid rgba(45, 212, 191, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 20;
            transition: width 0.1s, height 0.1s, border-color 0.1s;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(45, 212, 191, 0.8);
        }
        #crosshair::before { top: 50%; left: -10px; right: -10px; height: 2px; transform: translateY(-50%); }
        #crosshair::after { left: 50%; top: -10px; bottom: -10px; width: 2px; transform: translateX(-50%); }
        
        #crosshair.locked {
            border-color: var(--danger);
            width: 30px; height: 30px;
        }
        #crosshair.locked::before, #crosshair.locked::after { background: var(--danger); }

        /* UI 覆蓋層 */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .instruction-toast {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 30px;
            border-radius: 4px;
            color: var(--accent);
            font-size: 16px;
            border: 1px solid rgba(45, 212, 191, 0.3);
            backdrop-filter: blur(5px);
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.2);
            font-weight: bold;
        }

        /* 畫面閃光 */
        .flash {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: white; opacity:0; pointer-events: none; z-index: 40;
        }
        .flash.active { animation: flash-anim 0.3s ease-out; }
        @keyframes flash-anim { 0% { opacity:1; } 100% { opacity:0; } }

        /* 結果 Modal */
        #result-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        #result-modal.show { opacity: 1; pointer-events: auto; cursor: default; }

        .result-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 0 40px rgba(192, 132, 252, 0.3), inset 0 0 20px rgba(0,0,0,0.5);
            transform: scale(0.8) translateY(50px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--text-main);
            position: relative;
            overflow: hidden;
        }
        #result-modal.show .result-card { transform: scale(1) translateY(0); }
        
        .result-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, rgba(45, 212, 191, 0.3), transparent 30%);
            animation: rotate 4s linear infinite;
            z-index: 0; pointer-events: none;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        .card-content { position: relative; z-index: 1; }

        .res-subtitle { font-size: 16px; margin-bottom: 5px; color: var(--text-muted); letter-spacing: 1px;}
        
        #res-hero {
            font-size: 48px;
            font-weight: 900;
            color: var(--accent);
            margin: 0 0 20px 0;
            text-shadow: 0 0 15px rgba(45, 212, 191, 0.5);
            letter-spacing: 2px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(192, 132, 252, 0.3);
            border-radius: 8px;
            padding: 10px;
        }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        .stat-val { font-size: 18px; font-weight: bold; color: #facc15; }

        #res-quote {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: justify;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .btn-continue {
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--accent);
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            pointer-events: auto;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-continue:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(45, 212, 191, 0.6); }
        .btn-continue:active { transform: scale(0.95); }

        /* 讀取動畫 */
        .loader {
            display: none;
            width: 30px; height: 30px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            aside { width: 100%; height: 30%; border-right: none; border-bottom: 1px solid rgba(192, 132, 252, 0.2); padding: 15px;}
            .result-card { padding: 25px 20px; }
            #res-hero { font-size: 36px; }
            .stats-grid { grid-template-columns: 1fr; gap: 10px; }
            .instruction-toast { font-size: 12px; bottom: 15px; }
            /* 手機板隱藏自訂準星，因為是觸控 */
            #crosshair { display: none; }
            main { cursor: crosshair; }
        }
    </style>
</head>
<body>

    <!-- 左側面板 -->
    <aside>
        <h2>✨ 勇者召喚名冊 ✨</h2>
        <textarea id="hero-list">
亞瑟王
梅林
甘道夫
鄧不利多
哈利波特
佛地魔
索隆
魯夫
炭治郎
五條悟
鳴人
佐助
皮卡丘</textarea>
        
        <label class="checkbox-row">
            <input type="checkbox" id="remove-drawn" checked>
            <span>召喚後將勇者移出名冊</span>
        </label>

        <label class="checkbox-row">
            <input type="checkbox" id="toggle-audio">
            <span>開啟星際沉浸音效</span>
        </label>

        <button id="update-btn" class="btn-reset">↺ 重置空間矩陣</button>

        <div class="drawn-section">
            <h3>🌌 已降臨的勇者：</h3>
            <ul id="drawn-list" class="drawn-list"></ul>
        </div>
    </aside>

    <!-- 右側主畫面 -->
    <main id="main-area">
        <div id="webgl-container"></div>
        
        <div id="crosshair"></div>

        <div class="ui-layer">
            <div class="instruction-toast" id="toast-msg">滑動/方向鍵移動視角，點擊星石發射雷射！</div>
        </div>

        <div class="flash" id="flash"></div>

        <!-- 結果 Modal -->
        <div id="result-modal">
            <div class="result-card">
                <div class="card-content">
                    <div class="res-subtitle">—— 宇宙星石碎裂，天選之人降臨 ——</div>
                    <div id="res-hero">勇者姓名</div>
                    
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-label">⚔️ 異界職業</div>
                            <div class="stat-val" id="res-class">解析中...</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">🛡️ 專屬神兵</div>
                            <div class="stat-val" id="res-weapon">掃描中...</div>
                        </div>
                    </div>

                    <div id="res-quote">連線宇宙大數據，讀取命運預言中...</div>
                    <div class="loader" id="ai-loader"></div>
                    
                    <button id="btn-continue" class="btn-continue" style="display:none;">繼續召喚</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <script>
        window.addEventListener('error', function(e) {
            const toast = document.getElementById('toast-msg');
            if(toast) {
                toast.style.color = '#f43f5e';
                toast.textContent = '系統錯誤: ' + e.message;
            }
        });

        const STATE = { PLAYING: 'PLAYING', SHOOTING: 'SHOOTING', RESULT: 'RESULT' };
        let currentState = STATE.PLAYING;
        
        let availableHeroes = [];
        let drawnHeroes = [];
        let originalHeroesText = "";
        const apiKey = "";
        
        const heroListArea = document.getElementById('hero-list');
        const updateBtn = document.getElementById('update-btn');
        const removeCheckbox = document.getElementById('remove-drawn');
        const toggleAudioBtn = document.getElementById('toggle-audio');
        const drawnListUI = document.getElementById('drawn-list');
        const container = document.getElementById('webgl-container');
        const crosshair = document.getElementById('crosshair');
        const flash = document.getElementById('flash');
        const resultModal = document.getElementById('result-modal');
        const btnContinue = document.getElementById('btn-continue');
        const toastMsg = document.getElementById('toast-msg');
        
        const elHero = document.getElementById('res-hero');
        const elClass = document.getElementById('res-class');
        const elWeapon = document.getElementById('res-weapon');
        const elQuote = document.getElementById('res-quote');
        const aiLoader = document.getElementById('ai-loader');

        let scene, camera, renderer, clock;
        let asteroids = [];
        let particles, explosionParticles = [];
        let laserLine;
        let summonedCrystal = null;
        let hoveredAsteroid = null;
        let audioEngine = null;
        
        let camTheta = 0, camPhi = Math.PI / 2;
        let targetCamTheta = 0, targetCamPhi = Math.PI / 2;
        const camRadius = 30;
        let isPointerDown = false, isDragging = false;
        let downPointerPos = { x: 0, y: 0 };
        let lastPointerPos = { x: 0, y: 0 };

        const RAYCASTER = new THREE.Raycaster();
        const MOUSE = new THREE.Vector2();

        function init() {
            toggleAudioBtn.addEventListener('change', async (e) => {
                if (e.target.checked) {
                    if (!audioEngine) {
                        audioEngine = new CinematicAudioEngine();
                        await audioEngine.startBGM();
                    } else if (audioEngine.ctx.state === 'suspended') {
                        await audioEngine.ctx.resume();
                    }
                } else {
                    if (audioEngine && audioEngine.ctx.state === 'running') {
                        await audioEngine.ctx.suspend();
                    }
                }
            });

            originalHeroesText = heroListArea.value;
            // ✅ 修正：輸入名單時即時更新星石數量（debounce 避免打字中頻繁觸發）
            let inputDebounce = null;
            heroListArea.addEventListener('input', () => {
                originalHeroesText = heroListArea.value;
                clearTimeout(inputDebounce);
                inputDebounce = setTimeout(() => {
                    parseHeroList();
                    if (scene && currentState === STATE.PLAYING) spawnAsteroids();
                }, 400);
            });
            parseHeroList();

            updateBtn.addEventListener('click', () => {
                heroListArea.value = originalHeroesText; 
                parseHeroList();
                drawnHeroes = [];
                updateDrawnUI();
                resetGame();
            });

            btnContinue.addEventListener('click', (e) => {
                e.stopPropagation();
                resultModal.classList.remove('show');
                if (summonedCrystal) { scene.remove(summonedCrystal); summonedCrystal = null; }
                spawnAsteroids();
                resetGame();
            });

            const mainArea = document.getElementById('main-area');
            
            mainArea.addEventListener('pointerdown', (e) => {
                if (e.target.closest('#result-modal') || e.target.closest('aside')) return;
                isPointerDown = true;
                isDragging = false;
                downPointerPos.x = e.clientX;
                downPointerPos.y = e.clientY;
                lastPointerPos.x = e.clientX;
                lastPointerPos.y = e.clientY;
            });

            mainArea.addEventListener('pointermove', (e) => {
                if (e.pointerType === 'mouse') updateMousePos(e.clientX, e.clientY);
                
                if (isPointerDown) {
                    const dx = e.clientX - lastPointerPos.x;
                    const dy = e.clientY - lastPointerPos.y;
                    
                    if (!isDragging && (Math.abs(e.clientX - downPointerPos.x) > 5 || Math.abs(e.clientY - downPointerPos.y) > 5)) {
                        isDragging = true;
                    }
                    
                    if (isDragging) {
                        targetCamTheta -= dx * 0.005;
                        targetCamPhi -= dy * 0.005;
                        targetCamPhi = Math.max(0.1, Math.min(Math.PI - 0.1, targetCamPhi));
                    }
                    
                    lastPointerPos.x = e.clientX;
                    lastPointerPos.y = e.clientY;
                }
            });
            
            mainArea.addEventListener('pointerup', (e) => {
                if (!isPointerDown) return;
                isPointerDown = false;
                
                if (!isDragging) {
                    updateMousePos(e.clientX, e.clientY);
                    RAYCASTER.setFromCamera(MOUSE, camera);
                    const intersects = RAYCASTER.intersectObjects(asteroids);
                    hoveredAsteroid = intersects.length > 0 ? intersects[0].object : null;
                    shoot();
                }
                isDragging = false;
            });

            window.addEventListener('keydown', (e) => {
                const speed = 0.1;
                if (e.key === 'ArrowLeft' || e.key === 'a') targetCamTheta -= speed;
                if (e.key === 'ArrowRight' || e.key === 'd') targetCamTheta += speed;
                if (e.key === 'ArrowUp' || e.key === 'w') targetCamPhi -= speed;
                if (e.key === 'ArrowDown' || e.key === 's') targetCamPhi += speed;
                targetCamPhi = Math.max(0.1, Math.min(Math.PI - 0.1, targetCamPhi));
            });
            
            initThree();
        }

        function initThree() {
            // ✅ 修正：改用 main 元素的尺寸判斷，更可靠
            const mainEl = document.getElementById('main-area');
            const w = mainEl.clientWidth;
            const h = mainEl.clientHeight;

            if (w === 0 || h === 0) {
                setTimeout(initThree, 50);
                return;
            }

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020617, 0.015);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 1000);
            camera.position.set(0, 0, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(w, h);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x1e293b, 1.5);
            scene.add(ambient);
            
            const dirLight = new THREE.DirectionalLight(0xc084fc, 1);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            const pointLight = new THREE.PointLight(0x2dd4bf, 2, 50);
            pointLight.position.set(0, 0, 10);
            scene.add(pointLight);

            buildEnvironment();
            spawnAsteroids();

            const laserMat = new THREE.LineBasicMaterial({ color: 0x2dd4bf, linewidth: 5 });
            const laserGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-20,10), new THREE.Vector3(0,0,0)]);
            laserLine = new THREE.Line(laserGeo, laserMat);
            laserLine.visible = false;
            scene.add(laserLine);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function buildEnvironment() {
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<1000; i++) {
                starPos.push((Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200, -20 - Math.random() * 100);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.8 });
            particles = new THREE.Points(starGeo, starMat);
            scene.add(particles);

            const coreGeo = new THREE.SphereGeometry(2, 32, 32);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0x1e1b4b, transparent: true, opacity: 0.5 });
            const core = new THREE.Mesh(coreGeo, coreMat);
            scene.add(core);
        }

        function spawnAsteroids() {
            asteroids.forEach(ast => scene.remove(ast));
            asteroids = [];

            const astGeo = new THREE.DodecahedronGeometry(2, 1);
            const posAttr = astGeo.attributes.position;
            for(let i=0; i<posAttr.count; i++){
                posAttr.setXYZ(i, posAttr.getX(i)*(1+Math.random()*0.2), posAttr.getY(i)*(1+Math.random()*0.2), posAttr.getZ(i)*(1+Math.random()*0.2));
            }
            astGeo.computeVertexNormals();

            // ✅ 修正：星石數量等於目前名冊中的勇者數量
            const astCount = Math.max(1, availableHeroes.length);
            for(let i=0; i<astCount; i++) {
                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0x475569, 
                    roughness: 0.8,
                    emissive: 0x000000 
                });
                const mesh = new THREE.Mesh(astGeo, mat);
                
                const radius = 10 + Math.random() * 15;
                const angle = (i / astCount) * Math.PI * 2 + Math.random();
                const speed = (Math.random() * 0.5 + 0.2) * (Math.random() > 0.5 ? 1 : -1);
                const height = (Math.random() - 0.5) * 15;

                mesh.position.set(Math.cos(angle)*radius, height, Math.sin(angle)*radius);
                mesh.userData = { radius, angle, speed, height, rotSpeed: new THREE.Vector3(Math.random()*0.05, Math.random()*0.05, Math.random()*0.05) };
                scene.add(mesh);
                asteroids.push(mesh);
            }
        }

        function updateMousePos(clientX, clientY) {
            if (currentState !== STATE.PLAYING) return;
            
            const rect = container.getBoundingClientRect();
            crosshair.style.left = `${clientX - rect.left}px`;
            crosshair.style.top = `${clientY - rect.top}px`;

            MOUSE.x = ((clientX - rect.left) / container.clientWidth) * 2 - 1;
            MOUSE.y = -((clientY - rect.top) / container.clientHeight) * 2 + 1;
        }

        function shoot() {
            if (currentState !== STATE.PLAYING || availableHeroes.length === 0) {
                if(availableHeroes.length === 0) toastMsg.textContent = "名冊已空，請重置矩陣！";
                return;
            }

            if (hoveredAsteroid) {
                if (audioEngine && toggleAudioBtn.checked) audioEngine.playLaser();
                currentState = STATE.SHOOTING;
                document.body.style.cursor = 'default';
                crosshair.style.display = 'none';

                const laserOrigin = camera.position.clone();
                laserOrigin.y -= 2;
                laserLine.geometry.setFromPoints([laserOrigin, hoveredAsteroid.position]);
                laserLine.visible = true;

                setTimeout(() => {
                    laserLine.visible = false;
                    explodeAsteroid(hoveredAsteroid);

                }, 150);
            }
        }

        function explodeAsteroid(asteroid) {
            if (audioEngine && toggleAudioBtn.checked) audioEngine.playExplosion();
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 300);

            const color = 0x2dd4bf;
            const geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            for(let i=0; i<30; i++) {
                const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.copy(asteroid.position);
                const velocity = new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2);
                scene.add(mesh);
                explosionParticles.push({ mesh, velocity, life: 1.0 });
            }

            scene.remove(asteroid);
            asteroids = asteroids.filter(a => a !== asteroid);

            const cryGeo = new THREE.OctahedronGeometry(1.5);
            const cryMat = new THREE.MeshStandardMaterial({ 
                color: 0xc084fc, metalness: 0.8, roughness: 0.1, 
                emissive: 0x7e22ce, emissiveIntensity: 0.5 
            });
            summonedCrystal = new THREE.Mesh(cryGeo, cryMat);
            summonedCrystal.position.copy(asteroid.position);
            scene.add(summonedCrystal);
        }

        async function processGacha() {
            const randomIndex = Math.floor(Math.random() * availableHeroes.length);
            const heroName = availableHeroes[randomIndex];

            if (removeCheckbox.checked) {
                availableHeroes.splice(randomIndex, 1);
                heroListArea.value = availableHeroes.join('\n');
            }
            drawnHeroes.push(heroName);
            updateDrawnUI();

            currentState = STATE.RESULT;

            elHero.textContent = heroName;
            elClass.textContent = "解析中...";
            elWeapon.textContent = "掃描中...";
            elQuote.style.display = 'none';
            btnContinue.style.display = 'none';
            aiLoader.style.display = 'block';

            setTimeout(() => {
                resultModal.classList.add('show');
                fetchGeminiData(heroName);
            }, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            camTheta += (targetCamTheta - camTheta) * 0.1;
            camPhi += (targetCamPhi - camPhi) * 0.1;
            camera.position.x = camRadius * Math.sin(camPhi) * Math.sin(camTheta);
            camera.position.y = camRadius * Math.cos(camPhi);
            camera.position.z = camRadius * Math.sin(camPhi) * Math.cos(camTheta);
            camera.lookAt(0, 0, 0);

            particles.rotation.y += 0.001;

            if (currentState === STATE.PLAYING) {
                RAYCASTER.setFromCamera(MOUSE, camera);
                const intersects = RAYCASTER.intersectObjects(asteroids);
                
                asteroids.forEach(a => { a.material.emissive.setHex(0x000000); });
                hoveredAsteroid = null;
                crosshair.classList.remove('locked');

                if (intersects.length > 0) {
                    hoveredAsteroid = intersects[0].object;
                    hoveredAsteroid.material.emissive.setHex(0xf43f5e);
                    crosshair.classList.add('locked');
                }

                asteroids.forEach(ast => {
                    ast.userData.angle += ast.userData.speed * delta;
                    ast.position.x = Math.cos(ast.userData.angle) * ast.userData.radius;
                    ast.position.z = Math.sin(ast.userData.angle) * ast.userData.radius;
                    ast.position.y = ast.userData.height + Math.sin(time*2 + ast.userData.angle)*2;
                    
                    ast.rotation.x += ast.userData.rotSpeed.x;
                    ast.rotation.y += ast.userData.rotSpeed.y;
                    ast.rotation.z += ast.userData.rotSpeed.z;
                });
            }

            if (currentState === STATE.RESULT && summonedCrystal) {
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                const targetPos = camera.position.clone().add(dir.multiplyScalar(10));
                summonedCrystal.position.lerp(targetPos, 0.05);
                summonedCrystal.rotation.y += 0.05;
                summonedCrystal.rotation.x += 0.02;
            }

            for(let i = explosionParticles.length-1; i>=0; i--) {
                let p = explosionParticles[i];
                p.mesh.position.add(p.velocity);
                p.life -= delta * 2;
                p.mesh.material.opacity = p.life;
                p.mesh.scale.setScalar(p.life);
                if(p.life <= 0) {
                    scene.remove(p.mesh);
                    explosionParticles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        class CinematicAudioEngine {
            constructor() {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                this.bgmStarted = false;
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.8;
                this.masterGain.connect(this.ctx.destination);
            }

            async startBGM() {
                if (this.bgmStarted) return;
                if (this.ctx.state === 'suspended') await this.ctx.resume();
                this.bgmStarted = true;

                const convolver = this.ctx.createConvolver();
                const rate = this.ctx.sampleRate;
                const length = rate * 5;
                const impulse = this.ctx.createBuffer(2, length, rate);
                for (let i = 0; i < length; i++) {
                    const decay = Math.pow(1 - i / length, 4);
                    impulse.getChannelData(0)[i] = (Math.random() * 2 - 1) * decay;
                    impulse.getChannelData(1)[i] = (Math.random() * 2 - 1) * decay;
                }
                convolver.buffer = impulse;
                
                const reverbGain = this.ctx.createGain();
                reverbGain.gain.value = 0.7;
                convolver.connect(reverbGain);
                reverbGain.connect(this.masterGain);

                const dryGain = this.ctx.createGain();
                dryGain.gain.value = 0.6;
                dryGain.connect(this.masterGain);

                this.bgmOut = this.ctx.createGain();
                this.bgmOut.connect(dryGain);
                this.bgmOut.connect(convolver);

                const chords = [
                    [36, 48, 55, 60, 62],
                    [32, 44, 51, 56, 60],
                    [34, 46, 53, 58, 62],
                    [36, 48, 55, 60, 67]
                ];
                
                let step = 0;
                const playChord = () => {
                    const now = this.ctx.currentTime;
                    const currentChord = chords[step % chords.length];
                    
                    currentChord.forEach((midi, index) => {
                        const freq = 440 * Math.pow(2, (midi - 69) / 12);
                        const osc1 = this.ctx.createOscillator();
                        const osc2 = this.ctx.createOscillator();
                        osc1.type = index === 0 ? 'sine' : 'sawtooth';
                        osc2.type = 'sawtooth';
                        osc1.frequency.value = freq;
                        osc2.frequency.value = freq * 1.004;

                        const filter = this.ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.Q.value = 1;
                        filter.frequency.setValueAtTime(150, now);
                        filter.frequency.exponentialRampToValueAtTime(1200, now + 4);
                        filter.frequency.exponentialRampToValueAtTime(150, now + 8);
                        
                        const gain = this.ctx.createGain();
                        gain.gain.setValueAtTime(0, now);
                        const maxVol = index === 0 ? 0.35 : 0.08; 
                        gain.gain.linearRampToValueAtTime(maxVol, now + 3);
                        gain.gain.linearRampToValueAtTime(0, now + 8);

                        osc1.connect(filter);
                        osc2.connect(filter);
                        filter.connect(gain);
                        gain.connect(this.bgmOut);

                        osc1.start(now); osc1.stop(now + 8);
                        osc2.start(now); osc2.stop(now + 8);
                    });

                    const randomNote = currentChord[Math.floor(Math.random() * currentChord.length)];
                    const arpFreq = 440 * Math.pow(2, (randomNote + 24 - 69) / 12); 
                    const arpOsc = this.ctx.createOscillator();
                    arpOsc.type = 'sine';
                    arpOsc.frequency.value = arpFreq;
                    
                    const arpGain = this.ctx.createGain();
                    arpGain.gain.setValueAtTime(0, now + 2);
                    arpGain.gain.linearRampToValueAtTime(0.06, now + 2.1);
                    arpGain.gain.exponentialRampToValueAtTime(0.001, now + 4);
                    
                    arpOsc.connect(arpGain);
                    arpGain.connect(this.bgmOut);
                    arpOsc.start(now + 2);
                    arpOsc.stop(now + 4);

                    step++;
                    this.bgmTimer = setTimeout(playChord, 8000); 
                };

                playChord();
            }

            playLaser() {
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const osc2 = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc2.type = 'square';
                osc.frequency.setValueAtTime(1500, t);
                osc.frequency.exponentialRampToValueAtTime(100, t + 0.2);
                osc2.frequency.setValueAtTime(800, t);
                osc2.frequency.exponentialRampToValueAtTime(50, t + 0.2);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.6, t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                osc.connect(gain); osc2.connect(gain);
                gain.connect(this.masterGain);
                osc.start(t); osc.stop(t + 0.2);
                osc2.start(t); osc2.stop(t + 0.2);
            }

            playExplosion() {
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const t = this.ctx.currentTime;
                const subOsc = this.ctx.createOscillator();
                const subGain = this.ctx.createGain();
                subOsc.type = 'sine';
                subOsc.frequency.setValueAtTime(200, t);
                subOsc.frequency.exponentialRampToValueAtTime(20, t + 1.0);
                subGain.gain.setValueAtTime(1.5, t);
                subGain.gain.exponentialRampToValueAtTime(0.01, t + 2.0);
                subOsc.connect(subGain);
                subGain.connect(this.masterGain);
                subOsc.start(t); subOsc.stop(t + 2.0);

                const bufferSize = this.ctx.sampleRate * 2;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                const noiseFilter = this.ctx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.Q.value = 2;
                noiseFilter.frequency.setValueAtTime(3000, t);
                noiseFilter.frequency.exponentialRampToValueAtTime(100, t + 1.0);
                const noiseGain = this.ctx.createGain();
                noiseGain.gain.setValueAtTime(1, t);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 1.5);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(this.masterGain);
                noise.start(t); noise.stop(t + 1.5);
            }
        }

        window.onload = init;
    </script>
